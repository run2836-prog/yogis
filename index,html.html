<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centered Ad</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f1f1f1;
        font-family: Arial, sans-serif;
    }

    .ad-container {
        width: 250px;
        height: 250px;
        background: linear-gradient(135deg, #ff512f, #dd2476);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        color: white;
        text-align: center;
        padding: 15px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
    }

    .ad-title {
        font-size: 20px;
        font-weight: bold;
        margin-top: 10px;
    }

    .ad-text {
        font-size: 14px;
        margin: 15px 0;
    }

    .ad-btn {
        display: inline-block;
        padding: 10px 18px;
        background: white;
        color: #dd2476;
        font-weight: bold;
        border-radius: 20px;
        text-decoration: none;
        transition: 0.3s;
    }

    .ad-btn:hover {
        background: #ffe3ec;
        transform: scale(1.05);
    }

    .close-btn {
        position: absolute;
        top: 5px;
        right: 8px;
        font-size: 14px;
        cursor: pointer;
        color: white;
    }

    .circle {
        position: absolute;
        width: 120px;
        height: 120px;
        background: rgba(255,255,255,0.15);
        border-radius: 50%;
        top: -30px;
        left: -30px;
    }
</style>
</head>

<body>

<div class="ad-container" id="adBox">
    <div class="circle"></div>
    <div class="close-btn" onclick="closeAd()">✖</div>
    
    <div class="ad-title">🔥 Special Offer</div>
    <div class="ad-text">
        Learn HTML, CSS & JavaScript <br>
        Start Your Coding Journey Today!
    </div>
    
    <a href="#" class="ad-btn">Enroll Now</a>
</div>

<script>
    function closeAd() {
        document.getElementById("adBox").style.display = "none";
    }
</script>

</body>
</html>
